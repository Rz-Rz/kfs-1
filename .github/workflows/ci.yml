name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    env:
      KFS_CONTAINER_ENGINE: docker
      KFS_CONTAINER_TTY: 0
      KFS_SKIP_VNC_E2E: 1
      NO_COLOR: 1
    steps:
      - uses: actions/checkout@v4

      - name: Test
        run: make test
